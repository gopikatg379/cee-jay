{% extends "accounts/accounts_base.html" %}
{% block content %}
<h2>Add Ledger</h2>
<form method="post">{% csrf_token %}
<label>Name:</label> <input type="text" name="name" required><br>
<label>Group:</label>
<select name="group">
    {% for grp in groups %}
        <option value="{{grp.id}}">{{grp.group_name}}</option>
    {% endfor %}
</select><br>
<label>Opening Balance:</label> <input type="number" step="0.01" name="opening_balance"><br>
<button type="submit">Add Ledger</button>
</form>
{% endblock %}
