<!DOCTYPE html>
<html>
<head>
    <title>Add Payment</title>
    <style>
        form { max-width: 500px; margin: 20px auto; }
        label { display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 6px; margin-top: 4px; }
        button { margin-top: 15px; padding: 8px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        h2 { text-align: center; }
    </style>
</head>
<body>
    <h2>Add Payment</h2>
    <form method="post">{% csrf_token %}
        <label>Ledger</label>
        <select name="ledger" required>
            {% for ledger in ledgers %}
            <option value="{{ ledger.id }}">{{ ledger.ledger_name }}</option>
            {% endfor %}
        </select>

        <label>Payment Type</label>
        <select name="payment_type" required>
            <option value="Credit">Credit</option>
            <option value="Debit">Debit</option>
        </select>

        <label>Amount</label>
        <input type="number" name="amount" step="0.01" required>

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Mode (Cash/Bank/UPI)</label>
        <input type="text" name="mode">

        <label>Remarks</label>
        <textarea name="remarks"></textarea>

        <button type="submit">Add Payment</button>
    </form>
</body>
</html>
